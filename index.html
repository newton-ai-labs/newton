<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Newton — an AI-native code editor. A better Cursor." />
    <title>Newton — AI Code Editor</title>
    <script>
      // Apply the persisted theme BEFORE first paint to avoid FOUC.
      // Mirrors src/theme.ts initTheme() but runs synchronously in head.
      // Keep the valid-IDs list in sync with src/themes/registry.ts.
      (function () {
        var VALID = ['newton', 'newton-light'];
        var DEFAULT = 'newton';
        try {
          var t = localStorage.getItem('newton.theme');
          // Migrate legacy IDs.
          if (t === 'light' || t === 'daylight') t = 'newton-light';
          else if (t === 'dark') t = 'newton';
          if (VALID.indexOf(t) === -1) t = DEFAULT;
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', DEFAULT);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
